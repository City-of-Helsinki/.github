name: Common CI for Python libraries

on:
  workflow_call:
    inputs:
      python-matrix:
          description: "Python versions to use in the test matrix. This needs to be an array inside of a string, e.g. \"['3.10', '3.11']\", due to GHA not supporting array inputs."
          required: true
          type: string
      python-version:
          description: "Python version to use for pre-commit checks."
          required: false
          type: string
          default: "3.x"
      enable-sonar:
          description: "Whether to run the SonarQube Cloud Scan job after tests or not. Enabled by default."
          required: false
          type: boolean
          default: true
      postgres-major-version:
          description: "PostgreSQL major version to use for testing (supported: 13, 14, 17). Optional - omit if no database is needed."
          required: false
          type: string
          default: ''
      use-postgis:
          description: "Set to true to use the PostGIS extension. Requires postgres-major-version to be set."
          required: false
          type: boolean
          default: false
    secrets:
      sonar-token:
        description: "Token for SonarQube Cloud Scan. Required if enable-sonar is set to true."
        required: false
      github-token:
        description: "GITHUB_TOKEN. Required if enable-sonar is set to true."
        required: false

jobs:
  commitlint:
    name: Check commit messages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed  # v6.2.1

  pre-commit:
    name: Run pre-commit hooks
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup Python ${{ inputs.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run pre-commit
      uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1

  tests:
    name: Python ${{ matrix.python_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python_version: ${{ fromJSON(inputs.python-matrix) }}

    steps:
    - name: Validate provided PostgreSQL major version
      if: ${{ inputs.postgres-major-version != '' }}
      env:
        POSTGRES_MAJOR_VERSION: ${{ inputs.postgres-major-version }}
      run: |
        supported_versions=("13" "14" "17")
        if [[ ! " ${supported_versions[*]} " == *" ${POSTGRES_MAJOR_VERSION} "* ]]; then
          echo "Error: Unsupported PostgreSQL major version provided. Supported versions are 13, 14 and 17."
          exit 1
        fi

    - name: Start PostgreSQL
      if: ${{ inputs.postgres-major-version != '' }}
      env:
        # The workflow supports only the PostgreSQL and PostGIS versions used in Platta
        POSTGRES_IMAGE: ${{ inputs.use-postgis &&
                  (inputs.postgres-major-version == '17' && 'postgis/postgis:17-3.5-alpine' ||
                   inputs.postgres-major-version == '14' && 'postgis/postgis:14-3.2-alpine' ||
                   inputs.postgres-major-version == '13' && 'postgis/postgis:13-3.2-alpine') ||
                  (inputs.postgres-major-version == '17' && 'postgres:17-alpine' ||
                   inputs.postgres-major-version == '14' && 'postgres:14-alpine' ||
                   inputs.postgres-major-version == '13' && 'postgres:13-alpine') }}
      run: |
        docker run -d --name postgres \
          -e POSTGRES_USER=test_user \
          -e POSTGRES_PASSWORD=test_password \
          -e POSTGRES_DB=test_db \
          -p 5432:5432 \
          --health-cmd pg_isready \
          --health-interval 10s \
          --health-timeout 5s \
          --health-retries 5 \
          "$POSTGRES_IMAGE"
        echo "Waiting for PostgreSQL to become healthy..."
        for _ in $(seq 1 30); do
          status=$(docker inspect --format '{{.State.Health.Status}}' postgres)
          if [[ "$status" == "healthy" ]]; then
            echo "PostgreSQL is healthy."
            exit 0
          fi
          sleep 2
        done
        echo "Error: PostgreSQL did not become healthy in time."
        docker logs postgres
        exit 1

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Python ${{ matrix.python_version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python_version }}

    - name: Set up pip cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      env:
        cache-name: cache-pip-modules
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

    - name: Install system packages
      if: ${{ inputs.postgres-major-version != '' }}
      env:
        USE_POSTGIS: ${{ inputs.use-postgis }}
      run: |
        packages=(libpq-dev)
        if [[ "${USE_POSTGIS}" == "true" ]]; then
          packages+=(gdal-bin)
        fi
        sudo apt-get update
        sudo apt-get install -y "${packages[@]}"

    - name: Set database URL
      if: ${{ inputs.postgres-major-version != '' }}
      run: echo "DATABASE_URL=${{ inputs.use-postgis == true && 'postgis' || 'postgres' }}://test_user:test_password@localhost/test_db" >> $GITHUB_ENV

    - name: Install hatch
      run: python -m pip install hatch

    - name: Run tests
      run: hatch test -c -i py=${{ matrix.python_version }}

    - name: Generate coverage report
      run: hatch run coverage xml -o coverage-${{ matrix.python_version }}.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: coverage-${{ matrix.python_version }}
        path: coverage-${{ matrix.python_version }}.xml

  sonarcloud:
    name: Run SonarQube Cloud Scan
    runs-on: ubuntu-latest
    needs: tests
    if: ${{ inputs.enable-sonar }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        # Required by SonarQube Cloud
        fetch-depth: 0

    - name: Download coverage reports
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        merge-multiple: true
        path: .coverage-reports

    - name: SonarQube Cloud Scan
      uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
      env:
        GITHUB_TOKEN: ${{ secrets.github-token }}
        SONAR_TOKEN: ${{ secrets.sonar-token }}
